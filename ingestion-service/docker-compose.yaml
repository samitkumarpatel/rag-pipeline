version: "3.9"

# ── Local development stack ────────────────────────────────────────────
# Starts the Ingestion Service + RabbitMQ for end-to-end local testing.
#
# Usage:
#   docker-compose up --build
#
# RabbitMQ Management UI → http://localhost:15672  (guest / guest)
# Ingestion API          → http://localhost:8081/api/v1/ingestion/upload
# Actuator health        → http://localhost:8081/actuator/health

services:

  # ── RabbitMQ ────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: rag-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # ── Ingestion Service ────────────────────────────────────────────────
  ingestion-service:
    build:
      context: .
      dockerfile: Dockerfile.jvm
    container_name: rag-ingestion
    ports:
      - "8081:8081"
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      INGESTION_STORAGE_BASE_DIR: /data/rag-uploads
    volumes:
      - upload_data:/data/rag-uploads
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  rabbitmq_data:
  upload_data: